<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Log In — Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="canopy"></div>

<div class="auth-page">
  <div class="auth-form-card">
    <div class="glyph">🌿🌷</div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to the Garden</p>

    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="your@email.com" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Your password" required minlength="6">
      </div>
      <p class="error-msg" id="formError"></p>
      <button type="submit" class="primary-btn" id="submitBtn">Log In 🌷</button>
    </form>

    <div class="auth-divider">or</div>
    <button class="google-btn" id="googleBtn">Continue with Google</button>

    <p class="auth-switch">New here? <a href="signup.html">Create an account</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth-pages.js"></script>
<script>
  document.getElementById("loginForm").addEventListener("submit", handleLogin);
  document.getElementById("googleBtn").addEventListener("click", googleSignIn);
</script>
</body>
</html>
