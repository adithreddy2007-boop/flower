<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Sign Up — Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="canopy"></div>

<div class="auth-page">
  <div class="auth-form-card">
    <div class="glyph">🌷🌹</div>
    <h1>Join the Garden</h1>
    <p class="sub">Create your account</p>

    <form id="signupForm">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="nameInput" placeholder="e.g. Zoey" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="your@email.com" required>
      </div>
      <div class="field">
        <label>Mobile number (optional)</label>
        <div class="phone-row">
          <select id="phoneCode">
            <option value="+91">🇮🇳 +91</option>
            <option value="+1">🇺🇸 +1</option>
            <option value="+44">🇬🇧 +44</option>
            <option value="+61">🇦🇺 +61</option>
            <option value="+971">🇦🇪 +971</option>
          </select>
          <input type="tel" id="phoneInput" placeholder="9999999999">
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmInput" placeholder="Repeat password" required minlength="6">
      </div>
      <p class="error-msg" id="formError"></p>
      <button type="submit" class="primary-btn" id="submitBtn">Create Account 🌷</button>
    </form>

    <div class="auth-divider">or</div>
    <button class="google-btn" id="googleBtn">Continue with Google</button>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>

    <div class="auth-tip">
      🔒 Use a password you don't use anywhere else important — this keeps
      things simple and your other accounts safe.
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth-pages.js"></script>
<script>
  document.getElementById("signupForm").addEventListener("submit", handleSignup);
  document.getElementById("googleBtn").addEventListener("click", googleSignIn);
</script>
</body>
</html>
